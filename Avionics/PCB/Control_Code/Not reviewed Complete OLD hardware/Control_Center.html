<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALAN Control Center Floating Template</title>

<style>
/* =========================================================
   EDIT THIS PART FIRST
   Put the background image in the SAME FOLDER as this HTML.
   Then change only the filename below.

   Examples:
   --background-image-url: url("Control Center Desing.png");
   --background-image-url: url("my_dashboard_background.jpg");
   --background-image-url: none;
   ========================================================= */
:root {
  --dashboard-w: 1920px;
  --dashboard-h: 1080px;
  --background-image-url: url("Control Center Desing no interactive.png");

  --bg-blue: #030b4f;
  --panel-blue: #050d58;
  --black: #000000;
  --white: #f5f7ff;

  --green: #00c96b;
  --red: #ff3333;
  --yellow: #ead76b;

  --button-dark: #1a2a3a;
  --button-gray: #777777;
  --button-blue: #2f7dff;
}

/* =========================================================
   HOW TO POSITION ELEMENTS
   Every visible element below has class="float".
   To move anything, edit its inline style:

   style="--x: 100px; --y: 200px; --w: 150px; --h: 40px;"

   --x = left coordinate
   --y = top coordinate
   --w = width, optional
   --h = height, optional
   --z = z-index, optional
   ========================================================= */

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  color: var(--white);
  font-family: Arial, Helvetica, sans-serif;
}

/* This wrapper makes the whole 1920x1080 dashboard fill the screen vertically. */
#scale-wrapper {
  position: fixed;
  left: 50%;
  top: 0;
  height: 100vh;
  width: calc(100vh * 1920 / 1080);
  transform: translateX(-50%);
  overflow: visible;
}

#dashboard {
  position: absolute;
  left: 0;
  top: 0;
  width: 1920px;
  height: 1080px;
  transform-origin: top left;
  background: var(--bg-blue);
  overflow: hidden;
}

#backgroundImageLayer {
  position: absolute;
  inset: 0;
  background-image: var(--background-image-url);
  background-size: 100% 100%;
  background-position: center center;
  background-repeat: no-repeat;
  z-index: 0;
  pointer-events: none;
}

.float {
  position: absolute;
  left: var(--x, 0px);
  top: var(--y, 0px);
  width: var(--w, auto);
  height: var(--h, auto);
  z-index: var(--z, 10);
}

/* General dynamic text */
.dynamic-field {
  font-size: 20px;
  color: var(--white);
  white-space: nowrap;
}

.label-text {
  color: var(--white);
  font-size: 20px;
  white-space: nowrap;
}

/* Status colors */
.status-good {
  color: var(--green);
}

.status-bad {
  color: var(--red);
}

/* Buttons */
.control-button {
  background: var(--button-dark);
  color: var(--white);
  border: 2px solid var(--black);
  border-radius: 18px;
  padding: 10px 18px;
  font-size: 18px;
  cursor: pointer;
  text-align: center;
}

.control-button:hover {
  filter: brightness(1.15);
}

.serial-button {
  background: var(--button-blue);
}

.disconnect-button {
  background: var(--button-gray);
}

.log-button {
  background: var(--button-dark);
}

/* Stage pills */
.stage-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 120px;
  padding: 8px 14px;
  border: 3px solid var(--black);
  border-radius: 18px;
  background: var(--red);
  color: #000;
  font-size: 18px;
  text-align: center;
}

.stage-pill.active {
  background: var(--green);
}

/* Module pills */
.module-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 80px;
  padding: 10px 14px;
  border: 3px solid var(--black);
  border-radius: 24px;
  background: var(--green);
  color: #001b0d;
  font-size: 17px;
  text-align: center;
}

.module-pill.bad {
  background: var(--red);
}

/* Valve visual circles */
.valve-visual {
  width: 56px;
  height: 56px;
  border: 3px solid var(--black);
  border-radius: 50%;
  background: var(--red);
  color: #111;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  text-align: center;
}

.valve-visual.open {
  background: var(--green);
}

/* Override */
.override-status {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 260px;
  padding: 7px 14px;
  border-radius: 16px;
  background: var(--red);
  color: #000;
  font-size: 18px;
  text-align: center;
}

.override-status.override-active {
  background: var(--green);
}

/* Inputs */
.command-input {
  background: #fff;
  color: #000;
  border: 2px solid var(--black);
  border-radius: 18px;
  padding: 8px 14px;
  font-size: 20px;
}

/* Tilt visual */
#tiltVisualBox {
  position: absolute;
  left: var(--x, 0px);
  top: var(--y, 0px);
  width: var(--w, 260px);
  height: var(--h, 180px);
  border: 0px solid #fff;
/*  border-top: 0px solid #fff;
  border-right: 0px solid #fff;*/
  background: transparent;
  z-index: var(--z, 10);
}

.tilt-needle {
  position: absolute;
  left: 5px;
  bottom: 5px;
  width: 4px;
  height: 130px;
  background: #fff;
  transform-origin: bottom center;
  transform: rotate(0deg);
}

/* Optional visual helper: turn this on while placing elements. */
.debug-box {
  outline: 1px dashed rgba(255,255,255,0.3);
}


/* Backend-added graph canvas/window. Move using --x/--y/--w/--h like all float elements. */
.graph-window {
  background: rgba(3, 11, 79, 0.10);
  border: 2px dashed rgba(255,255,255,0.35);
  pointer-events: none;
}

/* Larger timeline text */
.timeline-sign {
  font-size: 82px;
  line-height: 1;
  font-weight: 500;
}

.timeline-value {
  font-size: 46px;
  line-height: 1;
  text-align: center;
}

/* Simple modal for SET_TIME and SET_STAGE */
#commandModalBackdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.65);
  align-items: center;
  justify-content: center;
}

#commandModal {
  width: 520px;
  background: #d7d7d7;
  color: #111;
  border: 4px solid #000;
  border-radius: 18px;
  padding: 20px;
  font-family: Arial, Helvetica, sans-serif;
}

#commandModal h2 {
  margin: 0 0 12px 0;
}

#commandModal input {
  width: 100%;
  font-size: 22px;
  padding: 10px;
  border: 2px solid #000;
  border-radius: 10px;
  margin-top: 10px;
}

.modal-buttons {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 16px;
}

.modal-buttons button {
  border: 2px solid #000;
  border-radius: 12px;
  padding: 8px 16px;
  font-size: 18px;
  cursor: pointer;
}

#modalSendBtn {
  background: var(--button-blue);
  color: #fff;
}

#serialDebugLog {
  display: none;
  position: absolute;
  left: 20px;
  top: 20px;
  width: 620px;
  height: 260px;
  background: rgba(0,0,0,0.88);
  color: #bfe0ff;
  border: 2px solid rgba(255,255,255,0.35);
  padding: 10px;
  font: 14px Consolas, monospace;
  overflow: auto;
  z-index: 999;
  white-space: pre-wrap;
}

#serialDebugLog.visible {
  display: block;
}


/* Design update: serial and radio link colors */
.serial-button.serial-connected {
  background: var(--green);
  color: #000;
}

.radio-link-good {
  color: var(--green) !important;
}

.radio-link-bad {
  color: var(--red) !important;
}

/* Design update: graph axis/grid styling */
.graph-window {
  border: none;
}

</style>
</head>

<script>
/* =========================================================
   ALAN CONTROL CENTER BACKEND
   Reads JSON lines from Nano over Web Serial.
   Sends text commands to Nano.
   Updates only IDs/classes; your coordinates stay untouched.
   ========================================================= */

/* Keeps the 1920x1080 coordinate system full-height on any monitor. */
function resizeDashboard() {
  const scale = window.innerHeight / 1080;
  const dashboard = document.getElementById('dashboard');
  dashboard.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', resizeDashboard);
resizeDashboard();

const FT_PER_M = 3.28084;
const stageNames = {
  1: 'waiting',
  2: 'arm',
  3: 'ignition',
  4: 'engine working',
  5: 'data gathering'
};
const rejectReasons = {
  0: 'accepted',
  1: 'unknown',
  2: 'bad checksum',
  3: 'override required',
  4: 'bad password',
  5: 'bad stage',
  6: 'not armed',
  7: 'arm not complete',
  8: 'bad payload'
};

let serialPort = null;
let serialReader = null;
let serialWriter = null;
const textEncoder = new TextEncoder();

const app = {
  serialConnected: false,
  lastStage: null,
  lastMain: 0,
  lastRelief: 0,
  lastDump: 0,
  graphPoints: [],
  graphEvents: [],
  logs: [],
  maxAlt: 0,
  lastRadioPacketMs: 0
};

function el(id) {
  return document.getElementById(id);
}

function setText(id, value) {
  const e = el(id);
  if (e) e.textContent = value;
}

function setGoodBad(e, good) {
  if (!e) return;
  e.classList.toggle('status-good', !!good);
  e.classList.toggle('status-bad', !good);
}

function setPill(id, active) {
  const e = el(id);
  if (e) e.classList.toggle('active', !!active);
}

function setModule(id, ok) {
  const e = el(id);
  if (e) e.classList.toggle('bad', !ok);
}

function setValveVisual(id, open) {
  const e = el(id);
  if (e) {
    e.classList.toggle('open', !!open);
    e.textContent = open ? 'open' : 'closed';
  }
}

function num(value, fallback = 0) {
  const n = Number(value);
  return Number.isFinite(n) ? n : fallback;
}

function fmt(value, digits = 1) {
  const n = Number(value);
  return Number.isFinite(n) ? n.toFixed(digits) : '-';
}

function addLog(line) {
  const msg = `${new Date().toLocaleTimeString()} ${line}`;
  app.logs.push(msg);
  if (app.logs.length > 2000) app.logs.shift();
  const logBox = el('serialDebugLog');
  if (logBox) {
    logBox.textContent = app.logs.join('\n');
    logBox.scrollTop = logBox.scrollHeight;
  }
}

async function writeLine(command) {
  if (!serialWriter) {
    addLog(`NOT CONNECTED: ${command}`);
    return;
  }
  await serialWriter.write(textEncoder.encode(command + '\n'));
  setText('lastCommandSentText', command);
  addLog(`TX ${command}`);
}

async function connectSerial() {
  try {
    serialPort = await navigator.serial.requestPort();
    await serialPort.open({ baudRate: 115200 });
    serialWriter = serialPort.writable.getWriter();
    app.serialConnected = true;
    const connectButton = el('connectBtn');
    if (connectButton) {
      connectButton.textContent = 'connected';
      connectButton.classList.add('serial-connected');
    }
    addLog('SERIAL CONNECTED');
    serialReadLoop();
  } catch (err) {
    addLog(`CONNECT ERROR: ${err.message}`);
  }
}

async function disconnectSerial() {
  try { if (serialReader) await serialReader.cancel(); } catch (err) {}
  try { if (serialWriter) { serialWriter.releaseLock(); serialWriter = null; } } catch (err) {}
  try { if (serialPort) await serialPort.close(); } catch (err) {}
  serialPort = null;
  app.serialConnected = false;
  const connectButton = el('connectBtn');
  if (connectButton) {
    connectButton.textContent = 'Connect Serial';
    connectButton.classList.remove('serial-connected');
  }
  addLog('SERIAL DISCONNECTED');
}

async function serialReadLoop() {
  const decoder = new TextDecoder();
  serialReader = serialPort.readable.getReader();
  let buffer = '';

  try {
    while (true) {
      const { value, done } = await serialReader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      let newlineIndex;
      while ((newlineIndex = buffer.indexOf('\n')) >= 0) {
        const line = buffer.slice(0, newlineIndex).trim();
        buffer = buffer.slice(newlineIndex + 1);
        if (line) handleSerialLine(line);
      }
    }
  } catch (err) {
    addLog(`SERIAL ERROR: ${err.message}`);
  } finally {
    try { serialReader.releaseLock(); } catch (err) {}
  }
}

function handleSerialLine(line) {
  addLog(line);

  if (!line.startsWith('{')) return;

  try {
    const packet = JSON.parse(line);
    if (packet.type === 'fast' || packet.type === 'gps' || packet.type === 'modules' || packet.type === 'command_ack') {
      app.lastRadioPacketMs = Date.now();
    }
    if (packet.type === 'fast') handleFastPacket(packet);
    else if (packet.type === 'gps') handleGpsPacket(packet);
    else if (packet.type === 'modules') handleModulesPacket(packet);
    else if (packet.type === 'command_ack') handleAckPacket(packet);
    else if (packet.type === 'tx') handleTxPacket(packet);
  } catch (err) {
    addLog(`JSON ERROR: ${err.message}`);
  }
}

function resetGraph() {
  app.graphPoints = [];
  app.graphEvents = [];
  app.maxAlt = 0;
  app.lastMain = 0;
  app.lastRelief = 0;
  app.lastDump = 0;
  drawAltitudeGraph();
}

function handleFastPacket(m) {
  app.lastRadioPacketMs = Date.now();
  const stage = num(m.stage);
  const altM = num(m.alt_m);
  const timelineS = num(m.timeline_s);
  const main = num(m.main);
  const relief = num(m.relief);
  const dump = num(m.dump);

  // Graph is allowed to run in WAITING and does not reset on ARM anymore.
  // It resets when the ABORT command is sent.

  app.maxAlt = Math.max(app.maxAlt, altM);
  app.graphPoints.push({ t: timelineS, alt: altM });
  if (app.graphPoints.length > 2500) app.graphPoints.shift();

  if (app.lastMain === 1 && main === 0) {
    app.graphEvents.push({ label: 'MAIN close', t: timelineS, alt: altM });
  }
  if (app.lastRelief === 0 && relief === 1) {
    app.graphEvents.push({ label: 'RELIEF OPEN', t: timelineS, alt: altM });
  }

  app.lastMain = main;
  app.lastRelief = relief;
  app.lastDump = dump;
  app.lastStage = stage;

  setText('connectionText', 'CONNECTED');
  setText('radioDbText', m.rssi ?? m.radio_db ?? '#');
  const radioText = el('connectionText');
  const radioDb = el('radioDbText');
  if (radioText) {
    radioText.classList.add('radio-link-good');
    radioText.classList.remove('radio-link-bad');
  }
  if (radioDb) {
    radioDb.classList.add('radio-link-good');
    radioDb.classList.remove('radio-link-bad');
  }

  setText('stageNumberText', stage || '#');
  setText('stageNameText', stageNames[stage] || 'name');

  setText('velocityBoxText', fmt(m.vel_mps, 1));
  setText('tankPressureBoxText', fmt(m.tank_psi, 0));
  setText('chamberPressureBoxText', fmt(m.chamber_psi, 0));
  setText('batteryVoltageBoxText', fmt(m.battery_v, 1));
  setText('co2PressureBoxText', fmt(m.co2_psi, 0));

  setText('tiltDegText', fmt(m.tilt_deg, 1));
  setText('kalmanAltMText', fmt(m.alt_m, 1));
  setText('kalmanAltFtText', fmt(altM * FT_PER_M, 0));
  setText('kalmanVelMpsText', fmt(m.vel_mps, 1));
  setText('kalmanVelFpsText', fmt(num(m.vel_mps) * FT_PER_M, 1));
  setText('predApogeeMText', fmt(m.pred_apogee_m, 1));
  setText('predApogeeFtText', fmt(num(m.pred_apogee_m) * FT_PER_M, 0));

  setText('timelineSignText', timelineS < 0 ? 'T-' : 'T+');
  setText('timelineValueText', Math.abs(timelineS).toFixed(1));

  setGoodBad(el('mainOpenText'), main === 1);
  setGoodBad(el('reliefOpenText'), relief === 1);
  setGoodBad(el('dumpOpenText'), dump === 1);

  const flags1 = num(m.flags1);
  const flags2 = num(m.flags2);
  setGoodBad(el('mainConnectionText'), (flags2 & 64) !== 0);
  setGoodBad(el('reliefConnectionText'), (flags2 & 128) !== 0);
  setGoodBad(el('dumpConnectionText'), (flags2 & 32) !== 0);

  setValveVisual('mainValveVisual', main === 1);
  setValveVisual('reliefValveVisual', relief === 1);
  setValveVisual('dumpValveVisual', dump === 1);

  setPill('stageWaitingPill', stage === 1);
  setPill('stageArmedPill', stage === 2);
  setPill('stageIgnitionPill', stage === 3);
  setPill('stageNoReturnPill', (flags1 & 16) !== 0);

  const overrideActive = (flags1 & 128) !== 0;
  const overridePill = el('overrideStatusPill');
  if (overridePill) overridePill.classList.toggle('override-active', overrideActive);

  const tiltNeedle = el('tiltNeedle');
  if (tiltNeedle) tiltNeedle.style.transform = `rotate(${num(m.tilt_deg)}deg)`;

  if (m.commands_received !== undefined) setText('commandCountText', m.commands_received);
  if (m.last_cmd !== undefined) setText('commandReceivedText', m.last_cmd);

  drawAltitudeGraph();
}

function handleGpsPacket(m) {
  setText('gpsLonText', fmt(m.lon, 7));
  setText('gpsLatText', fmt(m.lat, 7));
  setText('gpsAltMText', fmt(m.alt_m, 3));
  setText('gpsAltFtText', fmt(num(m.alt_m) * FT_PER_M, 3));
  setText('gpsSivText', m.siv ?? 0);
  setText('gpsPpsText', m.pps ?? 0);
  setText('lastReceivedPacketText', 'GPS');
  if (m.commands_received !== undefined) setText('commandCountText', m.commands_received);
  if (m.last_cmd !== undefined) setText('commandReceivedText', m.last_cmd);
}

function handleModulesPacket(m) {
  const moduleFlags = num(m.module_flags);
  setModule('moduleSdPill', (moduleFlags & 2) !== 0);
  setModule('moduleLsmPill', (moduleFlags & 4) !== 0);
  setModule('moduleAdxlPill', (moduleFlags & 8) !== 0);
  setModule('moduleBmePill', (moduleFlags & 16) !== 0);
  setModule('moduleGpsPill', (moduleFlags & 32) !== 0);
  setModule('moduleDsPill', (moduleFlags & 64) !== 0);
  setText('lastReceivedPacketText', 'STATUS');
  if (m.commands_received !== undefined) setText('commandCountText', m.commands_received);
  if (m.last_cmd !== undefined) setText('commandReceivedText', m.last_cmd);
}

function handleAckPacket(m) {
  setText('lastReceivedPacketText', 'ACK');
  setText('commandReceivedText', m.last_cmd ?? '-');
  setText('commandAcceptedText', num(m.accepted) === 1 ? 'YES' : 'NO');
  setText('commandReasonText', rejectReasons[num(m.reason)] || m.reason || '-');
  if (m.commands_received !== undefined) setText('commandCountText', m.commands_received);
}

function handleTxPacket(m) {
  if (m.cmd) setText('lastCommandSentText', m.cmd);
}

function drawAltitudeGraph() {
  const canvas = el('altitudeGraphCanvas');
  if (!canvas) return;

  const width = canvas.offsetWidth || 800;
  const height = canvas.offsetHeight || 400;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = width * dpr;
  canvas.height = height * dpr;

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, width, height);

  const padL = 62;
  const padR = 32;
  const padT = 34;
  const padB = 52;
  const plotW = Math.max(10, width - padL - padR);
  const plotH = Math.max(10, height - padT - padB);
  const x0 = padL;
  const y0 = height - padB;
  const x1 = width - padR;
  const y1 = padT;

  const targetAlt = 3048;
  const maxAlt = Math.max(targetAlt * 1.1, app.maxAlt * 1.15, 100);
  const times = app.graphPoints.map(p => p.t);
  const minT = Math.min(0, ...times);
  let maxT = Math.max(10, ...times);
  if (maxT <= minT) maxT = minT + 10;

  const x = t => x0 + ((t - minT) / (maxT - minT)) * plotW;
  const y = a => y0 - (a / maxAlt) * plotH;

  ctx.save();
  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.font = '15px Arial';

  // Grid and axis values.
  const yTicks = 5;
  const xTicks = 6;
  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.fillStyle = '#ffffff';

  for (let i = 0; i <= yTicks; i++) {
    const alt = (maxAlt / yTicks) * i;
    const py = y(alt);
    ctx.beginPath();
    ctx.moveTo(x0, py);
    ctx.lineTo(x1, py);
    ctx.stroke();
    ctx.fillText(`${alt.toFixed(0)} m`, 6, py + 5);
  }

  for (let i = 0; i <= xTicks; i++) {
    const t = minT + ((maxT - minT) / xTicks) * i;
    const px = x(t);
    ctx.beginPath();
    ctx.moveTo(px, y1);
    ctx.lineTo(px, y0);
    ctx.stroke();
    ctx.fillText(`${t.toFixed(0)} s`, px - 12, height - 16);
  }

  // Axes with arrowheads.
  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = '#ffffff';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y1);
  ctx.lineTo(x0 - 8, y1 + 16);
  ctx.moveTo(x0, y1);
  ctx.lineTo(x0 + 8, y1 + 16);
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y0);
  ctx.lineTo(x1 - 16, y0 - 8);
  ctx.moveTo(x1, y0);
  ctx.lineTo(x1 - 16, y0 + 8);
  ctx.stroke();

  ctx.font = '20px Arial';
  ctx.fillText('alt', x0 - 36, y1 - 8);
  ctx.fillText('t', x1 + 8, y0 + 6);

  // Target altitude line.
  const targetY = y(targetAlt);
  ctx.setLineDash([10, 6]);
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, targetY);
  ctx.lineTo(x1, targetY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.font = '16px Arial';
  ctx.fillText('10000 ft / 3048 m', x0 + 8, targetY - 8);

  // Flight altitude line.
  if (app.graphPoints.length > 1) {
    ctx.lineWidth = 3;
    ctx.beginPath();
    app.graphPoints.forEach((p, i) => {
      const px = x(p.t);
      const py = y(p.alt);
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    });
    ctx.stroke();
  }

  // Event markers.
  ctx.font = '14px Arial';
  app.graphEvents.forEach(event => {
    const ex = x(event.t);
    const ey = y(event.alt);
    ctx.setLineDash([8, 5]);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex, y0);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(ex, ey, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillText(event.label, ex + 8, ey - 8);
  });

  ctx.restore();
}

function updateRadioLinkDisplay() {
  const radioText = el('connectionText');
  const radioDb = el('radioDbText');
  const now = Date.now();
  const radioAlive = app.lastRadioPacketMs > 0 && (now - app.lastRadioPacketMs) < 1500;

  if (radioAlive) {
    setText('connectionText', 'CONNECTED');
    if (radioText) {
      radioText.classList.add('radio-link-good');
      radioText.classList.remove('radio-link-bad');
    }
    if (radioDb) {
      radioDb.classList.add('radio-link-good');
      radioDb.classList.remove('radio-link-bad');
    }
  } else {
    setText('connectionText', 'DISCONNECTED');
    if (radioText) {
      radioText.classList.add('radio-link-bad');
      radioText.classList.remove('radio-link-good');
    }
    if (radioDb) {
      radioDb.classList.add('radio-link-bad');
      radioDb.classList.remove('radio-link-good');
    }
  }
}

function openCommandModal(title, helpText, placeholder, onSend) {
  const backdrop = el('commandModalBackdrop');
  const input = el('modalInput');
  setText('modalTitle', title);
  setText('modalHelp', helpText);
  input.value = '';
  input.placeholder = placeholder;
  backdrop.style.display = 'flex';
  input.focus();

  el('modalSendBtn').onclick = () => {
    onSend(input.value.trim());
    backdrop.style.display = 'none';
  };
  el('modalCancelBtn').onclick = () => {
    backdrop.style.display = 'none';
  };
}

function initializeBackend() {
  if (el('connectBtn')) el('connectBtn').onclick = connectSerial;
  if (el('disconnectBtn')) el('disconnectBtn').onclick = disconnectSerial;

  document.querySelectorAll('[data-cmd]').forEach(button => {
    button.onclick = () => {
      if (button.dataset.cmd === 'ABORT') resetGraph();
      writeLine(button.dataset.cmd);
    };
  });

  if (el('setStageBtn')) {
    el('setStageBtn').onclick = () => openCommandModal(
      'Set Stage',
      'Enter stage number, usually 1 to 5.',
      '3',
      value => writeLine(`SET_STAGE ${value}`)
    );
  }

  if (el('setTimeBtn')) {
    el('setTimeBtn').onclick = () => openCommandModal(
      'Set DS1307 Time',
      'Format: yy mo dd hh mm ss dow',
      '26 5 30 14 20 00 6',
      value => writeLine(`SET_TIME ${value}`)
    );
  }

  if (el('overrideSendBtn')) {
    el('overrideSendBtn').onclick = () => {
      const password = el('overridePasswordInput') ? el('overridePasswordInput').value : '';
      writeLine(`OVERRIDE ${password}`);
    };
  }

  if (el('overrideExitBtn')) {
    el('overrideExitBtn').onclick = () => writeLine('EXIT_OVERRIDE');
  }

  if (el('downloadLogBtn')) {
    el('downloadLogBtn').onclick = () => {
      const csv = ['time,line', ...app.logs.map(line => `"${line.replaceAll('"', '""')}"`)].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'alan_control_center_log.csv';
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    };
  }

  if (el('clearLogBtn')) {
    el('clearLogBtn').onclick = () => {
      app.logs = [];
      const logBox = el('serialDebugLog');
      if (logBox) logBox.textContent = '';
      resetGraph();
    };
  }

  // Optional: double click connection text to show/hide raw serial log.
  if (el('connectionText')) {
    el('connectionText').ondblclick = () => {
      const logBox = el('serialDebugLog');
      if (logBox) logBox.classList.toggle('visible');
    };
  }

  drawAltitudeGraph();
  updateRadioLinkDisplay();
  setInterval(updateRadioLinkDisplay, 500);
}

window.addEventListener('load', initializeBackend);
window.addEventListener('resize', drawAltitudeGraph);
</script>

</body>
